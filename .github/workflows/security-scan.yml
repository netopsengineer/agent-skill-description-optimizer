---
name: Security scan

# Scheduled autonomy re-run: re-tests the full gate against main even with no open
# PR, plus a fresh dependency-advisory scan (catches advisories published after
# merge). GitHub emails the repo owner on scheduled-run failure. Daily Dependabot
# activity keeps this cron from auto-disabling after 60 days of inactivity.
on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-scan
  cancel-in-progress: false

jobs:
  full-gate:
    name: full-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Check out the repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.29"

      - name: Sync the environment
        env:
          UV_MALWARE_CHECK: "1"
        run: uv sync --locked

      - name: Run the full prek gate
        run: uv run prek run --all-files --show-diff-on-failure --color always

      - name: uv audit (advisory scan of uv.lock)
        run: uv audit --preview-features audit

      - name: OSV-Scanner (repo-wide)
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --recursive
            ./
