---
name: Release

on:
  push:
    branches: [main]

# Read-only by default; the release job elevates to contents: write, the publish
# job to id-token/attestations for OIDC trusted publishing.
permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  # python-semantic-release inspects Conventional-Commit history, bumps the static
  # project.version, updates CHANGELOG.md, tags, and cuts a GitHub Release. It pushes
  # to protected main using the GitHub App token (the ruleset bypass actor); an App
  # push also re-triggers workflows, unlike GITHUB_TOKEN. PSR is idempotent, so its
  # own bump-commit push re-runs this workflow as a no-op.
  release:
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      released: ${{ steps.release.outputs.released }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Mint a GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Least privilege: PSR only needs Contents (push bump/tag + create Release).
          permission-contents: write

      - name: Check out the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Python Semantic Release
        id: release
        # PSR authenticates its push/tag/release via the github_token input (the App
        # token), so the checkout above keeps persist-credentials: false.
        uses: python-semantic-release/python-semantic-release@39dd2052f2ce8282a5d932c31d58a2ca06d2550e  # v10.6.1
        with:
          github_token: ${{ steps.app-token.outputs.token }}

  # Build + publish. Always builds and validates the artifact (the no-op test signal);
  # the PyPI upload is gated behind the PUBLISH_TO_PYPI repo variable so the release
  # path is fully exercised without contacting PyPI until deliberately enabled.
  publish:
    name: publish
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Check out the released tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: ${{ needs.release.outputs.tag }}
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "0.11.28"
          # No cache in the publish path — avoids a cache-poisoning vector where a
          # restored cache could influence the artifact that gets published.
          enable-cache: false

      - name: Build the distribution
        env:
          UV_MALWARE_CHECK: "1"
        run: uv build

      - name: Check the distribution metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI (OIDC trusted publishing, PEP 740 attestations)
        if: vars.PUBLISH_TO_PYPI == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          attestations: true
