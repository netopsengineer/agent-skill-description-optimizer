---
name: Dependabot auto-merge

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: dependabot-auto-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # Enable squash auto-merge on Dependabot PRs. GitHub's --auto flag holds the merge
  # until the required Validate checks pass and the ruleset is satisfied, so no
  # wait-for-CI logic is needed here. Uses GITHUB_TOKEN (no App key on Dependabot
  # events). All update types (incl. majors) auto-merge — CI is the sole gate.
  auto-merge:
    name: auto-merge
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.repository == github.event.pull_request.head.repo.full_name
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98  # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (squash)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
