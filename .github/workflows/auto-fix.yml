---
name: Auto-fix

# Privileged half of the Dependabot auto-fix flow. React to the Validate workflow
# FAILING on a Dependabot PR and push the mechanical fixes that Validate's
# unprivileged `autofix-patch` job already computed. This job consumes that fix
# set as DATA and rebuilds the commit through the Git Data API: it never checks
# out, fetches, or executes the PR's code (no actions/checkout of the untrusted
# ref, no git fetch/checkout of its SHA, no uv/prek), so no untrusted code runs in
# this privileged, write-credentialled context. workflow_run runs in the base-repo
# context, so the App-token secrets are available; the App-token ref update
# re-triggers Validate (GITHUB_TOKEN pushes would not). Human PRs are never
# auto-mutated.
on:
  # zizmor: ignore[dangerous-triggers] workflow_run is required by design (react to
  # Validate FAILING and re-trigger CI after the App-token ref update); it runs in
  # the base-repo context. The PR head is referenced only as a Git Data API
  # parameter (base tree + parent) — never checked out, fetched, or executed — so
  # no untrusted code runs at elevated privilege.
  workflow_run:
    workflows: [Validate]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: auto-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  auto-fix:
    name: auto-fix
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]'
    permissions:
      contents: read
      actions: read  # download-artifact reads the triggering run's artifacts
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920  # v2.20.0
        with:
          egress-policy: audit

      - name: Guard against auto-fix loops
        id: guard
        # Abort if the PR head is already an auto-fix commit — prevents an
        # infinite fix -> fail -> fix cycle when fixers cannot green the checks.
        # Decided from the event payload; no PR checkout needed.
        env:
          HEAD_MSG: ${{ github.event.workflow_run.head_commit.message }}
        run: |
          if printf '%s' "$HEAD_MSG" | head -n1 | grep -q '^ci: 🤖 mechanical auto-fix'; then
            echo "Head is already an auto-fix commit; skipping to avoid a loop." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download the fix set
        id: download
        if: steps.guard.outputs.skip == 'false'
        # Missing artifact (no fixable changes, or a genuinely red PR) is the
        # normal no-op case, not an error — fall through and let later steps skip.
        continue-on-error: true
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: autofix-fixes
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}
          path: fixes

      - name: Mint a GitHub App token
        id: app-token
        # Only mint a write-capable token once we actually have fixes to push.
        if: steps.guard.outputs.skip == 'false' && steps.download.outcome == 'success'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Least privilege: only Contents write (push mechanical fixes).
          permission-contents: write

      - name: Rebuild the fix commit via the Git Data API and update the branch
        if: steps.guard.outputs.skip == 'false' && steps.download.outcome == 'success'
        env:
          # gh api authenticates as the App installation (Contents: write).
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          f=fixes/fixes.json
          if [ ! -s "$f" ] || [ "$(jq 'length' "$f")" = "0" ]; then
            echo "No mechanical fixes to apply; leaving the PR unchanged." >&2
            exit 0
          fi
          # Refuse to push a partial commit if the fix set includes deletions —
          # rebuilding those safely is out of scope; leave the PR red for a human.
          if [ "$(jq '[.[] | select(.status == "D")] | length' "$f")" != "0" ]; then
            echo "Fix set includes deletions; refusing a partial auto-fix." >&2
            exit 0
          fi
          # Rebuild the fix commit entirely through the Git Data API. The PR head
          # is referenced only as an API parameter (base tree + parent) — its code
          # is never checked out, fetched, or executed in this privileged job.
          head_tree=$(gh api "repos/$REPO/git/commits/$HEAD_SHA" -q '.tree.sha')
          tree='[]'
          len=$(jq 'length' "$f")
          i=0
          while [ "$i" -lt "$len" ]; do
            path=$(jq -r ".[$i].path" "$f")
            mode=$(jq -r ".[$i].mode" "$f")
            blob=$(jq -c ".[$i] | {content, encoding: \"base64\"}" "$f" \
              | gh api "repos/$REPO/git/blobs" --input - -q '.sha')
            tree=$(jq -c --arg p "$path" --arg m "$mode" --arg s "$blob" \
              '. + [{path: $p, mode: $m, type: "blob", sha: $s}]' <<<"$tree")
            i=$((i + 1))
          done
          new_tree=$(jq -nc --arg base "$head_tree" --argjson t "$tree" \
            '{base_tree: $base, tree: $t}' \
            | gh api "repos/$REPO/git/trees" --input - -q '.sha')
          new_commit=$(jq -nc --arg t "$new_tree" --arg p "$HEAD_SHA" \
            '{message: "ci: 🤖 mechanical auto-fix", tree: $t, parents: [$p],
              author: {name: "optimizer-release-bot[bot]",
                       email: "optimizer-release-bot[bot]@users.noreply.github.com"}}' \
            | gh api "repos/$REPO/git/commits" --input - -q '.sha')
          # force=false => a branch that moved since Validate ran is a non-fast-
          # forward the API rejects; we never clobber newer work with a stale fix.
          jq -nc --arg s "$new_commit" '{sha: $s, force: false}' \
            | gh api -X PATCH "repos/$REPO/git/refs/heads/$HEAD_BRANCH" --input -
          echo "Pushed mechanical auto-fix $new_commit to $HEAD_BRANCH." >&2
